kind = "web"
previewPath = "/"
title = "AEGIS"
version = "1.0.0"
id = "artifacts/aegis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23935

[services.development]
run = "pnpm --filter @workspace/aegis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aegis", "run", "build" ]
publicDir = "artifacts/aegis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23935"
BASE_PATH = "/"
